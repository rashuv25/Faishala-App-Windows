name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Ensure data folder exists
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path data | Out-Null

      - name: Create client user in SQLite DB
        shell: powershell
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          python scripts/create_test_user.py

      - name: Build Windows app with PyInstaller
        run: pyinstaller --noconfirm --clean MuddaPhaisala.spec

      - name: Show built files
        shell: powershell
        run: |
          Get-ChildItem -Recurse dist\MuddaPhaisala | Select-Object FullName

      - name: Zip Windows build
        shell: powershell
        run: |
          Compress-Archive -Path dist\MuddaPhaisala\* -DestinationPath MuddaPhaisala-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuddaPhaisala-windows-build
          path: MuddaPhaisala-windows.zip